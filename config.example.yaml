caldav:
  base_url: "https://your-caldav-server.example.com/dav"
  username: "your-username"
  password: "your-password"

ai:
  enabled: true
  base_url: "https://api.openai.com/v1"
  api_key: "sk-..."
  model: "gpt-4o-mini"
  high_load_model: ""         # Optional fallback model for heavy sync windows
  high_load_event_threshold: 0  # 0 disables; if planning events >= threshold, switch to high_load_model
  high_load_auto_enabled: false  # If true, also auto-detect heavy sync windows by density/count/conflicts
  high_load_auto_score_threshold: 0.65  # Auto heavy-load score threshold (0+)
  high_load_auto_event_baseline: 12  # Event-count baseline used by auto heavy-load score
  high_load_use_flex: false   # If true, heavy sync windows also send service_tier=flex
  high_load_flex_fallback_to_auto: true  # If Flex fails (timeout/resource unavailable), retry once with service_tier=auto
  timeout_seconds: 90
  payload_logging_enabled: false
  payload_log_path: "data/test_logs/ai_payload_exchange.jsonl"
  payload_log_max_chars: 200000
  # system_prompt is stored separately in AVOCADO_PROMPT_PATH (default: ai_system_prompt.txt at project root)
  # [AI Task] template is stored separately in AVOCADO_AI_TASK_TEMPLATE_PATH
  # (default: ai_task_template.yaml at project root)

sync:
  window_days: 7
  interval_seconds: 300
  timezone_source: "host"  # host | manual
  freeze_hours: 0
  timezone: "UTC"

calendar_rules:
  stack_calendar_id: ""
  stack_calendar_name: "Avocado Stack Calendar"
  user_calendar_id: ""
  user_calendar_name: "Avocado User Calendar"
  new_calendar_id: ""
  new_calendar_name: "Avocado New Calendar"
  locked_calendar_ids: []

task_defaults:
  editable_fields:
    - start
    - end
    - summary
    - location
    - description
